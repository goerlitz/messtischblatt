<!DOCTYPE html>
<html>
<head>
    <title>Kreis Groß Wartenberg</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <meta http-equiv='imagetoolbar' content='no'/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style type="text/css">
        *, *::before, *::after { box-sizing: border-box; }
        html, body { overflow: hidden; padding: 0; margin: 0; height: 100%; width: 100%; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; }
        #header { height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; padding: 0 20px; background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); border-bottom: 1px solid #0f3460; }
        #header h1 { margin: 0; font-size: 20px; line-height: 1; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; color: #b0bec5; text-align: center; }
        #header h1 span { color: #4fc3f7; font-weight: 700; letter-spacing: 0.03em; }
        #header .subtitle { margin: 0; font-size: 11px; line-height: 1; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #6e8090; }
        #map { height: calc(100% - 64px - 32px); position: relative; }
        #footer {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 11px;
            color: #6e8090;
            letter-spacing: 0.03em;
        }
        #footer a { color: #4fc3f7; text-decoration: none; }
        #footer a:hover { text-decoration: underline; }
        #bottom-controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #opacity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(22, 33, 62, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 8px 16px;
            color: #b0bec5;
            font-size: 12px;
        }
        #opacity-control.hidden { display: none; }
        #legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(22, 33, 62, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 7px 11px;
            font-size: 12px;
            color: #b0bec5;
            letter-spacing: 0.03em;
        }
        #legend .legend-row { display: flex; align-items: center; gap: 8px; }
        #legend .legend-line {
            flex: none;
            width: 18px;
            height: 0;
            border-top: 3px solid;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.35);
        }
        #legend .legend-line.kreis { border-top-color: #5aa0c4; }
        #legend .legend-line.landes { border-top: 3px dashed #a24fbf; }
        #opacity-control label { white-space: nowrap; }
        #opacity-slider {
            width: 160px;
            accent-color: #4fc3f7;
            cursor: pointer;
        }
        #opacity-value { min-width: 32px; text-align: right; color: #4fc3f7; font-weight: 600; }
        #fit-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(22, 33, 62, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 8px 14px;
            color: #4fc3f7;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, border-color 0.2s;
        }
        #fit-btn:hover { background: #0f3460; border-color: #4fc3f7; }
        #fit-btn .fit-icon { font-size: 14px; line-height: 1; }

        /* OL zoom button style */
        .ol-zoom .ol-zoom-in,
        .ol-zoom .ol-zoom-out {
            background-color: #16213e !important;
            border: 1px solid #0f3460 !important;
            color: #b0bec5 !important;
            width: 32px !important;
            height: 32px !important;
            font-size: 18px !important;
            line-height: 32px !important;
        }
        .ol-zoom .ol-zoom-in:hover,
        .ol-zoom .ol-zoom-out:hover {
            background-color: #0f3460 !important;
            color: #4fc3f7 !important;
        }
        .ol-zoom { top: 10px; left: 10px; }

        @media (max-width: 768px) {
            #header { height: 72px; }
            #header h1 { font-size: 22px; }
            #map { height: calc(100% - 72px - 32px); }
            .ol-zoom .ol-zoom-in,
            .ol-zoom .ol-zoom-out {
                width: 44px !important;
                height: 44px !important;
                font-size: 24px !important;
                line-height: 44px !important;
            }
        }

        /* Custom layer panel (dark theme) */
        #layer-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #layer-toggle {
            background: rgba(22, 33, 62, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #b0bec5;
            font-size: 18px;
            width: 32px;
            height: 32px;
            line-height: 30px;
            text-align: center;
            cursor: pointer;
        }
        #layer-toggle:hover { background: #0f3460; color: #4fc3f7; }
        #layer-list {
            display: none;
            margin-top: 4px;
            background: rgba(22, 33, 62, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 14px 16px;
            min-width: 172px;
            color: #8fa3b3;
            font-size: 13px;
        }
        #layer-list.open { display: block; }
        .layer-group + .layer-group {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid #0f3460;
        }
        .layer-group-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4fc3f7;
            font-weight: 600;
            margin-bottom: 9px;
        }
        #layer-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: color 0.15s;
        }
        #layer-list label:hover { color: #cfd8df; }
        #layer-list label:has(input:checked) { color: #eaf6fc; font-weight: 600; }
        #layer-list .layer-name { display: flex; flex-direction: column; line-height: 1.3; }
        #layer-list .layer-name small {
            font-size: 10px;
            font-weight: 400;
            color: #6e8090;
            letter-spacing: 0.02em;
        }
        #layer-list label:has(input:checked) .layer-name small { color: #8bb4c6; }
        #layer-list input[type="radio"],
        #layer-list input[type="checkbox"] { accent-color: #4fc3f7; cursor: pointer; }
        @media (max-width: 768px) {
            #layer-toggle { width: 44px; height: 44px; font-size: 24px; line-height: 42px; }
        }

        /* City labels (modern pill with pin) */
        .city-label {
            position: relative;
            display: flex;
            align-items: center;
            padding: 4px 13px;
            background: rgba(22, 33, 62, 0.72);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 999px;
            color: #f0f3f6;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.03em;
            white-space: nowrap;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            user-select: none;
            transform: translateY(-6px);
            transition: opacity 0.15s linear;
        }
        .city-label::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -5px;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 6px solid rgba(22, 33, 62, 0.72);
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.js"></script>
</head>
<body>
    <div id="header">
        <h1>Kreis <span>Gross Wartenberg</span></h1>
        <p class="subtitle">Historische Karten</p>
    </div>
    <div id="map" class="map">
        <div id="layer-panel">
            <button id="layer-toggle" title="Ebenen">&#9636;</button>
            <div id="layer-list">
                <div class="layer-group">
                    <div class="layer-group-title">Topografisch</div>
                    <label><input type="radio" name="overlay" value="topo25" checked> <span class="layer-name">Meßtischblätter<small>1937–1940 · 1:25.000</small></span></label>
                </div>
                <div class="layer-group">
                    <div class="layer-group-title">Demografisch</div>
                    <label><input type="radio" name="overlay" value="census1910"> <span class="layer-name">Nationalitätenkarte<small>Volkszählung 1910 · 1:500.000</small></span></label>
                </div>
                <div class="layer-group">
                    <div class="layer-group-title">Beschriftungen</div>
                    <label><input type="checkbox" name="labels" value="cities" checked> Städte</label>
                </div>
                <div class="layer-group">
                    <div class="layer-group-title">Basiskarte</div>
                    <label><input type="radio" name="base" value="osm"> OpenStreetMap</label>
                    <label><input type="radio" name="base" value="esri"> Esri World Imagery</label>
                    <label><input type="radio" name="base" value="off" checked> Aus</label>
                </div>
            </div>
        </div>
        <div id="legend">
            <div class="legend-row"><span class="legend-line kreis"></span>Kreisgrenze</div>
            <div class="legend-row"><span class="legend-line landes"></span>Landesgrenze ab 1920</div>
        </div>
        <div id="bottom-controls">
            <div id="opacity-control">
                <label for="opacity-slider">Transparenz</label>
                <input id="opacity-slider" type="range" min="0" max="100" value="100">
                <span id="opacity-value">100%</span>
            </div>
            <button id="fit-btn" title="Auf das Kartengebiet einpassen"><span class="fit-icon">&#10530;</span> Einpassen</button>
        </div>
    </div>
    <div id="footer">
        Meßtischblätter 1937&ndash;1940, 1:25&thinsp;000 &mdash; Kartensammlung Herder-Institut (<a href="https://www.herder-institut.de/" target="_blank">herder-institut.de</a>) &amp; Staatsarchiv Posen
    </div>
    <script type="text/javascript">
        var topo25Layer = new ol.layer.Tile({
            title: 'Messtischblätter (Topo25) - 1937-1940, 1:25.000',
            visible: true,
            opacity: 1.0,
            source: new ol.source.XYZ({
                attributions: '',
                minZoom: 8,
                maxZoom: 16,
                url: './tiles_topo25/{z}/{x}/{y}.webp',
                tileSize: [256, 256]
            })
        });
        var census1910Layer = new ol.layer.Tile({
            title: 'Nationalitätenkarte — Volkszählung 1910, 1:500.000',
            visible: false,
            opacity: 1.0,
            source: new ol.source.XYZ({
                attributions: '',
                minZoom: 8,
                maxZoom: 16,
                url: './tiles_census1910/{z}/{x}/{y}.webp',
                tileSize: [256, 256]
            })
        });
        var osmLayer = new ol.layer.Tile({
            title: 'OpenStreetMap',
            visible: false,
            source: new ol.source.OSM()
        });
        var esriLayer = new ol.layer.Tile({
            title: 'Esri World Imagery',
            visible: false,
            source: new ol.source.XYZ({
                attributions: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community',
                maxZoom: 19,
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
            })
        });
        var map = new ol.Map({
            controls: ol.control.defaults.defaults(),
            target: 'map',
            layers: [osmLayer, esriLayer, census1910Layer, topo25Layer],
            view: new ol.View({
                center: [1939316.7540431642, 6682934.4834087156],
                zoom: 12,
                maxZoom: 16,
            })
        });

        function getActiveMapLayer() {
            return census1910Layer.getVisible() ? census1910Layer : topo25Layer;
        }

        function setMapOpacity(opacity) {
            topo25Layer.setOpacity(opacity);
            census1910Layer.setOpacity(opacity);
        }

        // Load extent from tiles-extent.json (regenerate with: python3 update-extent.py)
        fetch('./tiles-extent.json')
            .then(function(r) { return r.json(); })
            .then(function(meta) {
                topo25Layer.setExtent(meta.extent);
                census1910Layer.setExtent(meta.extent);
                topo25Layer.getSource().setProperties({ minZoom: meta.minZoom, maxZoom: meta.maxZoom });
                census1910Layer.getSource().setProperties({ minZoom: meta.minZoom, maxZoom: meta.maxZoom });
                map.getView().fit(meta.extent, { padding: [20, 20, 20, 20] });
                OVERLAY_EXTENT = meta.extent;
            });

        var kreisLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: './kreisgrenze.geojson',
                format: new ol.format.GeoJSON({
                    dataProjection: 'EPSG:3857',
                    featureProjection: 'EPSG:3857'
                })
            }),
            style: [
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(255, 255, 255, 0.55)',
                        width: 6
                    })
                }),
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: '#5aa0c4',
                        width: 2.2
                    })
                })
            ]
        });
        map.addLayer(kreisLayer);

        var landesLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: './landesgrenze.geojson',
                format: new ol.format.GeoJSON({
                    dataProjection: 'EPSG:3857',
                    featureProjection: 'EPSG:3857'
                })
            }),
            style: [
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(255, 255, 255, 0.55)',
                        width: 6
                    })
                }),
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: '#a24fbf',
                        width: 2.4,
                        lineDash: [11, 7],
                        lineCap: 'butt'
                    })
                })
            ]
        });
        map.addLayer(landesLayer);

        kreisLayer.getSource().once('change', function() {
            if (kreisLayer.getSource().getState() === 'ready') {
                OVERLAY_EXTENT = kreisLayer.getSource().getExtent();
                map.getView().fit(OVERLAY_EXTENT, {
                    padding: [20, 20, 20, 20]
                });
            }
        });

        // Custom layer panel: base map (with "off") + a single always-on overlay
        document.getElementById('layer-toggle').addEventListener('click', function() {
            document.getElementById('layer-list').classList.toggle('open');
        });
        document.querySelectorAll('#layer-panel input[type="radio"]').forEach(function(input) {
            input.addEventListener('change', function() {
                if (this.name === 'base') {
                    osmLayer.setVisible(this.value === 'osm');
                    esriLayer.setVisible(this.value === 'esri');
                    updateTransparencyControl();
                } else if (this.name === 'overlay') {
                    topo25Layer.setVisible(this.value === 'topo25');
                    census1910Layer.setVisible(this.value === 'census1910');
                    updateFooter();
                }
            });
        });

        // City labels (German/historical names) as modern pill overlays
        // Per-city pixel nudges [x, y] where a label would otherwise sit on a line.
        var LABEL_OFFSETS = {
            'Groß Wartenberg': [0, -14]
        };
        var cityOverlays = [];
        var citiesCheckbox = document.querySelector('#layer-panel input[name="labels"]');

        function applyCityVisibility() {
            var show = citiesCheckbox.checked;
            cityOverlays.forEach(function(o) {
                o.getElement().style.display = show ? '' : 'none';
            });
        }
        citiesCheckbox.addEventListener('change', applyCityVisibility);

        // Fade labels out between zoom 14 and 15 — close enough to read the map itself
        function applyCityZoomFade() {
            var zoom = map.getView().getZoom();
            var opacity = 1 - Math.min(Math.max((zoom - 14) / (15 - 14), 0), 1);
            cityOverlays.forEach(function(o) {
                o.getElement().style.opacity = opacity;
            });
        }
        map.getView().on('change:resolution', applyCityZoomFade);

        fetch('./cities.json')
            .then(function(r) { return r.json(); })
            .then(function(cities) {
                cities.forEach(function(city) {
                    var el = document.createElement('div');
                    el.className = 'city-label';
                    el.textContent = city.historical_name;
                    var overlay = new ol.Overlay({
                        element: el,
                        position: ol.proj.fromLonLat([city.lon, city.lat]),
                        positioning: 'bottom-center',
                        offset: LABEL_OFFSETS[city.historical_name] || [0, 0],
                        stopEvent: false
                    });
                    map.addOverlay(overlay);
                    cityOverlays.push(overlay);
                });
                applyCityVisibility();
                applyCityZoomFade();
            });

        var slider = document.getElementById('opacity-slider');
        var opacityValue = document.getElementById('opacity-value');
        var opacityControl = document.getElementById('opacity-control');
        var OVERLAY_EXTENT = null;
        var lastOpacity = 100;

        // Transparency only makes sense over the OSM base map. With the base off,
        // hide the slider and show the overlay fully opaque; restore the last value
        // when the base map comes back.
        function updateTransparencyControl() {
            if (osmLayer.getVisible() || esriLayer.getVisible()) {
                opacityControl.classList.remove('hidden');
                slider.value = lastOpacity;
                opacityValue.textContent = lastOpacity + '%';
                setMapOpacity(lastOpacity / 100);
            } else {
                opacityControl.classList.add('hidden');
                setMapOpacity(1);
            }
        }

        // Source attribution shown in the footer for the currently selected overlay.
        var FOOTER_SOURCES = {
            topo25: 'Meßtischblätter 1937&ndash;1940, 1:25&thinsp;000 &mdash; Kartensammlung Herder-Institut (<a href="https://www.herder-institut.de/" target="_blank">herder-institut.de</a>) &amp; Staatsarchiv Posen',
            census1910: 'Nationalitätenkarte, Volkszählung 1910, 1:500&thinsp;000 &mdash; Wikipedia / Universitätsbibliothek in Wrocław'
        };
        function updateFooter() {
            var overlay = document.querySelector('#layer-panel input[name="overlay"]:checked');
            document.getElementById('footer').innerHTML = (overlay && FOOTER_SOURCES[overlay.value]) || '';
        }

        slider.addEventListener('input', function() {
            lastOpacity = parseInt(this.value);
            setMapOpacity(lastOpacity / 100);
            opacityValue.textContent = lastOpacity + '%';
        });

        // Fit the view to the currently selected overlay's extent.
        document.getElementById('fit-btn').addEventListener('click', function() {
            var layer = getActiveMapLayer();
            var extent = (layer && layer.getExtent()) || OVERLAY_EXTENT;
            if (extent) {
                map.getView().fit(extent, { padding: [20, 20, 20, 20], duration: 400 });
            }
        });

        updateTransparencyControl();
        updateFooter();
    </script>
</body>
</html>
