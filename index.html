<!DOCTYPE html>
<html>
<head>
    <title>Kreis Groß Wartenberg</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <meta http-equiv='imagetoolbar' content='no'/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style type="text/css">
        *, *::before, *::after { box-sizing: border-box; }
        html, body { overflow: hidden; padding: 0; margin: 0; height: 100%; width: 100%; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; }
        #header { height: 52px; display: flex; align-items: center; justify-content: center; padding: 0 20px; background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); border-bottom: 1px solid #0f3460; }
        #header h1 { margin: 0; font-size: 18px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: #b0bec5; text-align: center; }
        #header h1 span { color: #4fc3f7; font-weight: 700; letter-spacing: 0.08em; }
        #map { height: calc(100% - 52px - 32px); position: relative; }
        #footer {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 11px;
            color: #6e8090;
            letter-spacing: 0.03em;
        }
        #footer a { color: #4fc3f7; text-decoration: none; }
        #footer a:hover { text-decoration: underline; }
        #opacity-control {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 33, 62, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e0e0e0;
            font-size: 13px;
        }
        #opacity-control label { white-space: nowrap; }
        #opacity-slider {
            width: 160px;
            accent-color: #4fc3f7;
            cursor: pointer;
        }
        #opacity-value { min-width: 32px; text-align: right; color: #4fc3f7; font-weight: 600; }
        #reset-btn {
            background: #0f3460;
            border: 1px solid #4fc3f7;
            border-radius: 5px;
            color: #4fc3f7;
            font-size: 12px;
            padding: 3px 10px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        #reset-btn:hover { background: #1a5276; }

        /* OL zoom button style */
        .ol-zoom .ol-zoom-in,
        .ol-zoom .ol-zoom-out {
            background-color: #16213e !important;
            border: 1px solid #0f3460 !important;
            color: #b0bec5 !important;
            width: 32px !important;
            height: 32px !important;
            font-size: 18px !important;
            line-height: 32px !important;
        }
        .ol-zoom .ol-zoom-in:hover,
        .ol-zoom .ol-zoom-out:hover {
            background-color: #0f3460 !important;
            color: #4fc3f7 !important;
        }
        .ol-zoom { top: 10px; left: 10px; }

        @media (max-width: 768px) {
            #header { height: 60px; }
            #header h1 { font-size: 22px; }
            #map { height: calc(100% - 60px - 32px); }
            .ol-zoom .ol-zoom-in,
            .ol-zoom .ol-zoom-out {
                width: 44px !important;
                height: 44px !important;
                font-size: 24px !important;
                line-height: 44px !important;
            }
        }

        /* LayerSwitcher dark theme */
        .layer-switcher { top: 10px; right: 10px; }
        .layer-switcher button {
            background-color: #16213e !important;
            border: 1px solid #0f3460 !important;
            border-radius: 6px;
            color: #b0bec5 !important;
            font-size: 18px;
            width: 32px;
            height: 32px;
        }
        .layer-switcher button:hover {
            background-color: #0f3460 !important;
            color: #4fc3f7 !important;
        }
        .layer-switcher.shown button { border-radius: 6px 6px 0 0; }
        .layer-switcher.shown .panel {
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #0f3460;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 0 4px 2px 4px;
            min-width: 140px;
        }
        .layer-switcher .panel li { font-size: 13px; }
        .layer-switcher ul { margin: 0.8em 0.4em !important; }
        .layer-switcher .panel ul ul { margin: 0.1em 0 0 0 !important; }
        .layer-switcher .panel li label { color: #b0bec5; letter-spacing: 0.03em; }
        .layer-switcher .panel li label:hover { color: #4fc3f7; }
        .layer-switcher .panel li.group > label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4fc3f7;
            font-weight: 600;
            display: inline-block;
            padding-bottom: 10px;
        }
        .layer-switcher input[type="radio"],
        .layer-switcher input[type="checkbox"] {
            accent-color: #4fc3f7;
            top: 50%;
            transform: translateY(-50%);
        }
        .layer-switcher .panel > ul > li.group:last-child {
            border-top: 1px solid #0f3460;
            margin-top: 6px;
            padding-top: 2px;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.js"></script>
    <script src="https://unpkg.com/ol-layerswitcher@4.1.1"></script>
    <link rel="stylesheet" href="https://unpkg.com/ol-layerswitcher@4.1.1/src/ol-layerswitcher.css" />
</head>
<body>
    <div id="header"><h1><span>Meßtischblätter</span> Kreis Groß Wartenberg</h1></div>
    <div id="map" class="map">
        <div id="opacity-control">
            <label for="opacity-slider">Transparenz</label>
            <input id="opacity-slider" type="range" min="0" max="100" value="100">
            <span id="opacity-value">100%</span>
            <button id="reset-btn">Reset</button>
        </div>
    </div>
    <div id="footer">
        Topographische Karten 1:25&thinsp;000 (Meßtischblätter), Kreis Groß Wartenberg, ca. 1938 &mdash; Kartensammlung Herder-Institut &mdash; <a href="https://www.herder-institut.de/" target="_blank">herder-institut.de</a>
    </div>
    <script type="text/javascript">
        var topo25Layer = new ol.layer.Tile({
            title: 'Messtischblätter (Topo25) - 1937-1940, 1:25.000',
            visible: true,
            opacity: 1.0,
            source: new ol.source.XYZ({
                attributions: '',
                minZoom: 8,
                maxZoom: 16,
                url: './tiles_topo25/{z}/{x}/{y}.webp',
                tileSize: [256, 256]
            })
        });
        var census1910Layer = new ol.layer.Tile({
            title: 'Census 1910',
            visible: false,
            opacity: 1.0,
            source: new ol.source.XYZ({
                attributions: '',
                minZoom: 8,
                maxZoom: 16,
                url: './tiles_census1910/{z}/{x}/{y}.webp',
                tileSize: [256, 256]
            })
        });
        var map = new ol.Map({
            controls: ol.control.defaults.defaults(),
            target: 'map',
            layers: [
                new ol.layer.Group({
                    title: 'Base maps',
                    layers: [
                        new ol.layer.Tile({
                            title: 'OpenStreetMap',
                            type: 'base',
                            visible: true,
                            source: new ol.source.OSM()
                        }),
                    ]
                }),
                new ol.layer.Group({
                    title: 'Demografische Karten',
                    layers: [census1910Layer]
                }),
                new ol.layer.Group({
                    title: 'Topografische Karten',
                    layers: [topo25Layer]
                }),
            ],
            view: new ol.View({
                center: [1939316.7540431642, 6682934.4834087156],
                zoom: 12,
                maxZoom: 16,
            })
        });

        function getActiveMapLayer() {
            return census1910Layer.getVisible() ? census1910Layer : topo25Layer;
        }

        function setMapOpacity(opacity) {
            topo25Layer.setOpacity(opacity);
            census1910Layer.setOpacity(opacity);
        }

        function enforceSingleMapLayer(selectedLayer, otherLayer) {
            if (selectedLayer.getVisible()) {
                otherLayer.setVisible(false);
            } else if (!otherLayer.getVisible()) {
                selectedLayer.setVisible(true);
            }
        }

        topo25Layer.on('change:visible', function() {
            enforceSingleMapLayer(topo25Layer, census1910Layer);
        });
        census1910Layer.on('change:visible', function() {
            enforceSingleMapLayer(census1910Layer, topo25Layer);
        });

        // Load extent from tiles-extent.json (regenerate with: python3 update-extent.py)
        fetch('./tiles-extent.json')
            .then(function(r) { return r.json(); })
            .then(function(meta) {
                topo25Layer.setExtent(meta.extent);
                census1910Layer.setExtent(meta.extent);
                topo25Layer.getSource().setProperties({ minZoom: meta.minZoom, maxZoom: meta.maxZoom });
                census1910Layer.getSource().setProperties({ minZoom: meta.minZoom, maxZoom: meta.maxZoom });
                map.getView().fit(meta.extent, { padding: [20, 20, 20, 20] });
                OVERLAY_EXTENT = meta.extent;
            });

        var kreisLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: './kreisgrenze.geojson',
                format: new ol.format.GeoJSON({
                    dataProjection: 'EPSG:3857',
                    featureProjection: 'EPSG:3857'
                })
            }),
            style: [
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(200, 0, 0, 0.2)',
                        width: 10
                    })
                }),
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(0, 0, 0, 0.5)',
                        width: 1.5,
                        lineDash: [12, 4, 12, 4, 2, 4]
                    })
                })
            ]
        });
        map.addLayer(kreisLayer);

        var landesLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: './landesgrenze.geojson',
                format: new ol.format.GeoJSON({
                    dataProjection: 'EPSG:3857',
                    featureProjection: 'EPSG:3857'
                })
            }),
            style: [
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(255, 100, 180, 0.25)',
                        width: 12
                    })
                }),
                new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(0, 0, 0, 0.5)',
                        width: 2.5,
                        lineDash: [12, 6]
                    })
                })
            ]
        });
        map.addLayer(landesLayer);

        kreisLayer.getSource().once('change', function() {
            if (kreisLayer.getSource().getState() === 'ready') {
                OVERLAY_EXTENT = kreisLayer.getSource().getExtent();
                map.getView().fit(OVERLAY_EXTENT, {
                    padding: [20, 20, 20, 20]
                });
            }
        });

        map.addControl(new ol.control.LayerSwitcher({
            reverse: true,
            groupSelectStyle: 'none'
        }));

        var slider = document.getElementById('opacity-slider');
        var opacityValue = document.getElementById('opacity-value');
        var OVERLAY_EXTENT = null;
        var DEFAULT_OPACITY = 100;

        slider.addEventListener('input', function() {
            var val = parseInt(this.value);
            setMapOpacity(val / 100);
            opacityValue.textContent = val + '%';
        });

        document.getElementById('reset-btn').addEventListener('click', function() {
            slider.value = DEFAULT_OPACITY;
            opacityValue.textContent = DEFAULT_OPACITY + '%';
            setMapOpacity(DEFAULT_OPACITY / 100);
            if (OVERLAY_EXTENT) {
                map.getView().fit(OVERLAY_EXTENT, { padding: [20, 20, 20, 20], duration: 400 });
            }
        });
    </script>
</body>
</html>
